<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';">
    <title>2Code - Welcome</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      /* Dark theme (default) */
      :root {
        --bg: #09090b;
        --text: #fafafa;
        --text-muted: #71717a;
        --border: rgba(255,255,255,0.1);
        --btn-bg: hsl(228 100% 50%);
        --btn-hover: hsl(228 100% 45%);
        --input-bg: rgba(255,255,255,0.05);
      }

      /* Light theme */
      @media (prefers-color-scheme: light) {
        :root {
          --bg: #ffffff;
          --text: #09090b;
          --text-muted: #71717a;
          --border: rgba(0,0,0,0.1);
          --btn-bg: hsl(228 100% 50%);
          --btn-hover: hsl(228 100% 45%);
          --input-bg: rgba(0,0,0,0.03);
        }
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        background: var(--bg);
        color: var(--text);
        -webkit-app-region: drag;
      }
      .container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 24px;
        max-width: 360px;
        width: 100%;
        padding: 0 20px;
        -webkit-app-region: no-drag;
      }
      .title {
        font-size: 24px;
        font-weight: 600;
        letter-spacing: -0.5px;
      }
      .subtitle {
        font-size: 14px;
        color: var(--text-muted);
        text-align: center;
        line-height: 1.5;
      }
      .status {
        font-size: 13px;
        color: var(--text-muted);
        text-align: center;
        min-height: 20px;
      }
      .status.success { color: #22c55e; }
      .status.error { color: #ef4444; }
      .btn {
        width: 100%;
        height: 36px;
        padding: 0 16px;
        background: var(--btn-bg);
        color: #fafafa;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 500;
        transition: background-color 0.15s ease, transform 0.15s ease;
      }
      .btn:hover { background: var(--btn-hover); }
      .btn:active { transform: scale(0.97); }
      .btn:disabled { opacity: 0.5; cursor: not-allowed; }
      .btn-secondary {
        background: transparent;
        color: var(--text);
        border: 1px solid var(--border);
      }
      .btn-secondary:hover { background: var(--input-bg); }
      .divider {
        display: flex;
        align-items: center;
        gap: 12px;
        width: 100%;
        color: var(--text-muted);
        font-size: 12px;
      }
      .divider::before, .divider::after {
        content: '';
        flex: 1;
        border-bottom: 1px solid var(--border);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="title">2Code</div>
      <div class="subtitle">
        AI-powered coding with Claude. Choose how to connect.
      </div>
      <div id="status" class="status"></div>

      <!-- Primary: Use existing Claude CLI auth -->
      <button class="btn" id="detectBtn">Use Claude CLI (Subscription)</button>

      <div class="divider">or enter an API key</div>

      <!-- Secondary: Skip to main app for API key setup -->
      <button class="btn btn-secondary" id="skipBtn">Configure API Key</button>
    </div>
    <script>
      console.log('[Login] 2Code login page loaded');

      const statusEl = document.getElementById('status');
      const detectBtn = document.getElementById('detectBtn');
      const skipBtn = document.getElementById('skipBtn');

      function setStatus(text, type) {
        statusEl.textContent = text;
        statusEl.className = 'status' + (type ? ' ' + type : '');
      }

      // Try to detect existing Claude CLI credentials on load
      if (window.desktopApi && window.desktopApi.checkClaudeCliAuth) {
        setStatus('Checking for Claude CLI...');
        window.desktopApi.checkClaudeCliAuth().then(function(result) {
          if (result && result.hasCredentials) {
            setStatus('Claude CLI detected — click to continue', 'success');
          } else if (result && result.cliInstalled) {
            setStatus('Claude CLI found but not authenticated');
          } else {
            setStatus('');
          }
        }).catch(function() {
          setStatus('');
        });
      } else {
        setStatus('');
      }

      // Detect CLI button: auto-authenticate using Claude CLI keychain credentials
      detectBtn.addEventListener('click', function() {
        detectBtn.disabled = true;
        setStatus('Authenticating with Claude CLI...');

        if (window.desktopApi && window.desktopApi.authenticateWithCli) {
          window.desktopApi.authenticateWithCli().then(function(result) {
            if (result && result.success) {
              setStatus('Authenticated! Loading...', 'success');
              // Main process will reload the window to show the app
            } else {
              setStatus(result?.error || 'Claude CLI auth failed. Try API key instead.', 'error');
              detectBtn.disabled = false;
            }
          }).catch(function(err) {
            setStatus('Error: ' + (err.message || 'Unknown error'), 'error');
            detectBtn.disabled = false;
          });
        } else {
          // Fallback: try startAuthFlow if available (legacy)
          if (window.desktopApi && window.desktopApi.startAuthFlow) {
            window.desktopApi.startAuthFlow();
          } else {
            setStatus('Desktop API not available. Please restart.', 'error');
            detectBtn.disabled = false;
          }
        }
      });

      // Skip button: go straight to the app with API key onboarding
      skipBtn.addEventListener('click', function() {
        if (window.desktopApi && window.desktopApi.skipToApp) {
          window.desktopApi.skipToApp();
        } else if (window.desktopApi && window.desktopApi.startAuthFlow) {
          // Fallback: use existing flow
          window.desktopApi.startAuthFlow();
        }
      });

      // Listen for auth success
      if (window.desktopApi && window.desktopApi.onAuthSuccess) {
        window.desktopApi.onAuthSuccess(function(user) {
          console.log('[Login] Auth success received:', user?.email);
          setStatus('Authenticated! Loading...', 'success');
        });
      }
    </script>
  </body>
</html>
